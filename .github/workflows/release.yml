name: Aulama Anime TV Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Restore upgrade-compatible signing key
        env:
          TV_SIGNING_KEY_BASE64: ${{ secrets.TV_SIGNING_KEY_BASE64 }}
        run: |
          test -n "$TV_SIGNING_KEY_BASE64"
          printf '%s' "$TV_SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/aulama-tv-release.jks"
      - name: Build
        env:
          TV_KEYSTORE_PATH: ${{ runner.temp }}/aulama-tv-release.jks
          TV_KEYSTORE_PASSWORD: ${{ secrets.TV_KEYSTORE_PASSWORD }}
          TV_KEY_ALIAS: ${{ secrets.TV_KEY_ALIAS }}
          TV_KEY_PASSWORD: ${{ secrets.TV_KEY_PASSWORD }}
        run: |
          chmod a+x ./gradlew
          ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" :app:assembleRelease
      - name: Verify and rename APK
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          test -f "$APK"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee /tmp/apk-signature.txt
          grep -qi 'f75ce15910009cf9735dfb2d32fbc586c01f52d0cacb73d51f1e2801a33b6dce' /tmp/apk-signature.txt
          mv "$APK" "aulama-anime-tv-${{ github.ref_name }}.apk"
      - name: Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "aulama-anime-tv-${{ github.ref_name }}.apk" \
            --title "Aulama Anime TV ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
